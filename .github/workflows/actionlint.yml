name: Lint GitHub Actions

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/*.yml'

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          filter_mode: nofilter
          fail_level: error

name: Build Environment Images

on:
  push:
    branches: [ "main" ]
    paths:
      - 'configs/**'
      - 'images/**'
      - 'bebe.py'
      - '.github/workflows/build_environments.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'configs/**'
      - 'images/**'
      - 'bebe.py'
      - '.github/workflows/build_environments.yml'
  workflow_dispatch:

jobs:
  discover-configs:
    name: Discover Configurations
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.set-configs.outputs.configs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find buildable configurations
        id: set-configs
        run: |
          CONFIGS=$(python bebe.py list --directory configs)
          echo "configs=$CONFIGS" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.config }}
    needs: discover-configs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover-configs.outputs.configs) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure Jinja2 is installed for the bebe script
          pip install Jinja2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Environment Image
        run: |
          python bebe.py build --config ${{ matrix.config }} \
            --registry ghcr.io/${{ github.repository }} \
            --push \
            --cache-from "type=gha,scope=${{ matrix.config }}" \
            --cache-to "type=gha,mode=max,scope=${{ matrix.config }},compression=zstd,force-compression=true" \
            --verbose

name: Build Environment Images

on:
  push:
    branches: [ "main" ]
    paths:
      - 'configs/**'
      - 'src/**'
      - 'pyproject.toml'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'configs/**'
      - 'src/**'
      - 'pyproject.toml'
      - 'tests/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ".[test]"

      - name: Run Pytest
        run: pytest --cov=bebe --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml

  discover-configs:
    name: Discover Configurations
    needs: test
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.set-configs.outputs.configs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install BeBe
        run: pip install .

      - name: Find buildable configurations
        id: set-configs
        run: |
          CONFIGS=$(bebe list --directory configs)
          echo "configs=$CONFIGS" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint ${{ matrix.config }}
    needs: discover-configs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover-configs.outputs.configs) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install BeBe
        run: pip install .

      - name: Generate Dockerfile
        run: |
          # Create a directory to store the generated Dockerfile
          # Hadolint action expects a file path
          bebe generate --config ${{ matrix.config }} > Dockerfile.lint

      - name: Run Hadolint
        id: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.lint
          failure-threshold: warning
          no-fail: true

      - name: Update Summary
        env:
          HADOLINT_RESULTS: ${{ steps.hadolint.outputs.results }}
          CONFIG_NAME: ${{ matrix.config }}
        run: |
          {
            echo "### Hadolint Lint Results for $CONFIG_NAME"
            if [ -n "$HADOLINT_RESULTS" ]; then
              echo "Status: ⚠️ Warnings/Errors found"
              echo '```'
              echo "$HADOLINT_RESULTS"
              echo '```'
            else
              echo "Status: ✅ No issues"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if warnings found
        if: steps.hadolint.outputs.results != ''
        run: exit 1

  build:
    name: Build ${{ matrix.config }}
    needs: [discover-configs, lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover-configs.outputs.configs) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Environment Image
        run: |
          # Sanitise config path into a valid Docker tag (configs/ubuntu.clang19.json -> ubuntu.clang19)
          CACHE_TAG=$(echo "${{ matrix.config }}" | sed 's|configs/||' | sed 's|\.json$||')
          # Docker registry references must be lowercase
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          CACHE_REF="ghcr.io/${REPO}/cache:${CACHE_TAG}"
          bebe build --config ${{ matrix.config }} \
            --registry ghcr.io/${{ github.repository }} \
            --push \
            --cache-from "type=registry,ref=${CACHE_REF}" \
            --cache-to "type=registry,ref=${CACHE_REF},mode=max" \
            --verbose
